<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol class="breadcrumb-list">
    <li><a href="{{ '/' | relative_url }}"><i class="fas fa-home"></i></a></li>
    {% if page.url != '/' %}
      {% assign parts = page.url | split: '/' %}
      {% assign path = '' %}
      {% for part in parts %}
        {% if part != '' %}
          {% assign path = path | append: '/' | append: part %}
          <li><a href="{{ path | relative_url }}">{{ part | capitalize }}</a></li>
        {% endif %}
      {% endfor %}
    {% endif %}
  </ol>
</nav>
